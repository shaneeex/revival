<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revival Signage Admin</title>
  <link rel="stylesheet" href="admin.css?v=20260314g" />
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header">
      <h1>Revival Signage Admin</h1>
      <p>Upload directly to Cloudinary and control overlay behavior.</p>
    </header>

    <section class="card">
      <h2>Overlay Control</h2>
      <div class="row">
        <label class="toggle-wrap" for="overlay-toggle">
          <input id="overlay-toggle" type="checkbox" />
          <span>Enable "Time Up" overlay</span>
        </label>
        <button id="save-settings-btn" type="button">Save Overlay Setting</button>
      </div>
    </section>

    <section class="card">
      <div class="card-head cloudinary-head">
        <h2>Cloudinary Upload</h2>
        <button id="refresh-cloudinary-btn" type="button" class="secondary">Refresh List</button>
      </div>
      <p id="cloudinary-config" class="muted"></p>
      <div class="upload-form">
        <label for="cloudinary-files">Select images/videos</label>
        <input id="cloudinary-files" type="file" multiple accept="image/*,video/*" />
        <button id="upload-cloudinary-btn" type="button">Upload to Cloudinary</button>
      </div>
      <div id="cloudinary-empty" class="muted">No Cloudinary items found for this tag yet.</div>
      <div id="cloudinary-list" class="playlist-list"></div>
    </section>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script src="admin.js?v=20260314g"></script>
</body>
</html>
