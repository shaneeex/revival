<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revival Signage Admin</title>
  <link rel="stylesheet" href="admin.css?v=20260315a" />
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header">
      <div class="admin-header-row">
        <h1>Revival Signage Admin</h1>
        <button id="logout-btn" type="button" class="secondary">Logout</button>
      </div>
      <p>Upload content and control overlay behavior.</p>
      <div id="persistence-warning" class="warning-banner hidden" role="status" aria-live="polite"></div>
    </header>

    <section class="card">
      <h2>Overlay Control</h2>
      <div class="row">
        <button id="overlay-toggle-btn" type="button" class="toggle-button">Overlay: ON</button>
      </div>
    </section>

    <section class="card">
      <h2>Upload Content</h2>
      <p id="cloudinary-config" class="muted hidden"></p>
      <div class="upload-form">
        <label for="cloudinary-files">Select files</label>
        <input id="cloudinary-files" type="file" multiple accept="image/*,video/*" />
        <label for="upload-image-title">Heading (optional for images)</label>
        <input id="upload-image-title" type="text" maxlength="120" placeholder="Enter heading" />
        <button id="upload-cloudinary-btn" type="button">Upload</button>
      </div>
      <div id="cloudinary-empty" class="muted">No content items configured yet.</div>
      <div id="cloudinary-list" class="playlist-list"></div>
    </section>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script src="admin.js?v=20260315c"></script>
</body>
</html>
