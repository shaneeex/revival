<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revival Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css?v=20260318b" />
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header card">
      <div class="admin-header-row">
        <div class="admin-title-wrap">
          <img
            class="admin-top-logo"
            src="logos/revival.png"
            onerror="this.onerror=null;this.src='logos/revival.jpg';"
            alt="Revival Sports"
          />
          <h1>Revival Signage Admin</h1>
        </div>
      </div>
      <p>Sign in to manage the signage screen.</p>
    </header>

    <section class="card login-card">
      <h2>Admin Login</h2>
      <form id="login-form" class="upload-form" autocomplete="on">
        <label for="login-username">Username</label>
        <input id="login-username" type="text" autocomplete="username" required />

        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required />

        <button id="login-btn" type="submit">Login</button>
      </form>
      <div id="login-status" class="status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="admin-login.js?v=20260314j"></script>
</body>
</html>
